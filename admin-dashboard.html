<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fusion Attire | Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fb;
      padding: 20px;
    }
    .header {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      color: white;
      padding: 24px;
      border-radius: 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    h1 { font-size: 24px; }
    .logout-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: #2a5298;
    }
    .stat-label { color: #666; font-size: 13px; margin-top: 4px; }
    .leaderboard, .reps-table {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    h2 { font-size: 18px; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { color: #666; font-weight: 600; font-size: 13px; }
    .rank-1 { background: #fff3cd; font-weight: 700; }
    .rank-2 { background: #e2e3e5; }
    .rank-3 { background: #d4edda; }
    .commission { font-weight: 600; color: #28a745; }
  </style>
</head>
<body>
  <div class="header">
    <h1>👑 Fusion Attire — Team Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="totalReps">0</div>
      <div class="stat-label">Active Reps</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalDesigners">0</div>
      <div class="stat-label">Total Designers</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalPassed">0</div>
      <div class="stat-label">Fusion Verified</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalCommissions">P0</div>
      <div class="stat-label">Total Commission Owed</div>
    </div>
  </div>

  <div class="leaderboard">
    <h2>🏆 Rep Leaderboard</h2>
    <table id="leaderboardTable">
      <thead><tr><th>Rank</th><th>Rep ID</th><th>Passed</th><th>Commission</th></tr></thead>
      <tbody><tr><td colspan="4" style="text-align:center">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="reps-table">
    <h2>📊 All Reps Performance</h2>
    <table id="repsTable">
      <thead>
        <tr>
          <th>Rep ID</th><th>Territory</th><th>Total</th><th>Passed</th><th>Conditional</th><th>Failed</th><th>Pending</th><th>Commission</th>
        </tr>
      </thead>
      <tbody><tr><td colspan="8" style="text-align:center">Loading...</td></tr></tbody>
    </table>
  </div>

  <script>
    const ZOHO_ACCESS_TOKEN = "your_access_token_here";
    
    async function fetchAllRepData() {
      // This would fetch from Zoho CRM API
      // For demo, using mock data
      const reps = [
        { id: 'FA001', territory: 'Gaborone North', total: 12, passed: 8, conditional: 2, failed: 1, pending: 1, commission: 800 },
        { id: 'FA002', territory: 'Gaborone South', total: 9, passed: 5, conditional: 2, failed: 1, pending: 1, commission: 500 },
        { id: 'FA003', territory: 'Molepolole', total: 15, passed: 10, conditional: 3, failed: 1, pending: 1, commission: 1000 },
        { id: 'FA004', territory: 'Lobatse', total: 6, passed: 3, conditional: 1, failed: 1, pending: 1, commission: 300 },
      ];
      
      const totalReps = reps.length;
      const totalDesigners = reps.reduce((sum, r) => sum + r.total, 0);
      const totalPassed = reps.reduce((sum, r) => sum + r.passed, 0);
      const totalCommissions = reps.reduce((sum, r) => sum + r.commission, 0);
      
      document.getElementById('totalReps').innerText = totalReps;
      document.getElementById('totalDesigners').innerText = totalDesigners;
      document.getElementById('totalPassed').innerText = totalPassed;
      document.getElementById('totalCommissions').innerText = `P${totalCommissions}`;
      
      const sorted = [...reps].sort((a, b) => b.passed - a.passed);
      const leaderboardBody = document.querySelector('#leaderboardTable tbody');
      leaderboardBody.innerHTML = '';
      sorted.forEach((rep, idx) => {
        let rankClass = '';
        if (idx === 0) rankClass = 'rank-1';
        else if (idx === 1) rankClass = 'rank-2';
        else if (idx === 2) rankClass = 'rank-3';
        leaderboardBody.innerHTML += `
          <tr class="${rankClass}">
            <td>${idx + 1}</td><td>${rep.id}</td><td>${rep.passed}</td><td class="commission">P${rep.commission}</td>
          </tr>
        `;
      });
      
      const repsBody = document.querySelector('#repsTable tbody');
      repsBody.innerHTML = '';
      reps.forEach(rep => {
        repsBody.innerHTML += `
          <tr>
            <td>${rep.id}</td><td>${rep.territory}</td><td>${rep.total}</td>
            <td>${rep.passed}</td><td>${rep.conditional}</td><td>${rep.failed}</td>
            <td>${rep.pending}</td><td class="commission">P${rep.commission}</td>
          </tr>
        `;
      });
    }
    
    function logout() {
      localStorage.removeItem('adminAuth');
      window.location.href = 'admin-login.html';
    }
    
    // Check auth
    if (!localStorage.getItem('adminAuth')) {
      window.location.href = 'admin-login.html';
    } else {
      fetchAllRepData();
    }
  </script>
</body>
</html>
